<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vero • чат</title>
<style>

  :root{
    --bg:#eef4ef;
    --bg2:#f7faf7;
    --panel:#ffffff;
    --panel2:#f2f7f2;
    --line:#dbe6db;
    --text:#122017;
    --muted:#5f7264;
    --accent:#2fa45a;
    --accent2:#1f7f42;
    --danger:#c94f4f;
    --shadow:0 16px 40px rgba(24, 44, 28, .08);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(47,164,90,.14), transparent 34%),
      radial-gradient(circle at bottom right, rgba(47,164,90,.08), transparent 28%),
      linear-gradient(180deg, var(--bg), #f8fbf8);
    color:var(--text);
  }
  a{color:inherit;text-decoration:none}
  button,input,textarea,select{font:inherit}
  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    position:sticky;top:0;z-index:20;
    backdrop-filter: blur(12px);
    background: rgba(238,244,239,.75);
    border-bottom:1px solid rgba(219,230,219,.8);
    padding:14px 18px;
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.3px}
  .logo{
    width:42px;height:42px;border-radius:14px;
    background: linear-gradient(145deg, var(--accent), #9be0b5);
    box-shadow: 0 10px 30px rgba(47,164,90,.25);
    display:grid;place-items:center;color:white;font-weight:900;
  }
  .shell{display:grid;grid-template-columns:320px 1fr;gap:18px;padding-top:18px}
  @media (max-width: 900px){ .shell{grid-template-columns:1fr} }
  .card{
    background:rgba(255,255,255,.82);
    border:1px solid rgba(219,230,219,.9);
    box-shadow:var(--shadow);
    border-radius:var(--radius);
  }
  .card.pad{padding:16px}
  .stack{display:grid;gap:12px}
  .muted{color:var(--muted)}
  .title{font-size:20px;font-weight:900;margin:0}
  .sub{margin:0;color:var(--muted);font-size:14px}
  .btn{
    border:0;border-radius:16px;padding:12px 16px;
    background:var(--accent);color:white;font-weight:800;cursor:pointer;
    box-shadow:0 10px 20px rgba(47,164,90,.18);
  }
  .btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.danger{background:var(--danger)}
  .btn.block{width:100%}
  .input, .textarea, .select{
    width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.95);
    color:var(--text);padding:12px 14px;outline:none;
  }
  .textarea{min-height:110px;resize:vertical}
  .row{display:flex;gap:10px;align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 12px;border-radius:999px;background:#edf7f0;border:1px solid #cce7d3;
    font-size:13px;font-weight:700;color:#215c34;
  }
  .pill{
    display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;
    background:#f3f7f4;border:1px solid var(--line);font-size:12px;color:var(--muted)
  }
  .list{display:grid;gap:10px}
  .item{
    display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;border:1px solid var(--line);
    background:rgba(255,255,255,.78);cursor:pointer;
  }
  .avatar{
    width:46px;height:46px;border-radius:16px;flex:0 0 auto;object-fit:cover;background:#e8eee9;
    border:1px solid #d6e0d7;
  }
  .avatar.big{width:96px;height:96px;border-radius:28px}
  .col{display:grid;gap:4px;min-width:0}
  .name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .desc{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab{
    padding:10px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);
    font-weight:800;cursor:pointer;
  }
  .tab.active{background:var(--accent);color:white;border-color:var(--accent)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width: 700px){ .grid2{grid-template-columns:1fr} }
  .divider{height:1px;background:var(--line);margin:12px 0}
  .small{font-size:12px}
  .kbd{font-family:ui-monospace, SFMono-Regular, Menlo, monospace;background:#f4f7f4;border:1px solid var(--line);padding:2px 6px;border-radius:8px}
  .chatbox{
    display:grid;grid-template-rows:auto 1fr auto;min-height:calc(100vh - 110px);
    gap:12px;padding:16px;
  }
  .messages{
    display:flex;flex-direction:column;gap:10px;overflow:auto;padding-right:4px;
  }
  .msg{
    max-width:min(720px, 85%);padding:11px 13px;border-radius:18px;border:1px solid var(--line);
    background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.03);
  }
  .msg.me{margin-left:auto;background:#ebf8ef;border-color:#cde5d4}
  .msg .time{display:block;margin-top:4px;font-size:11px;color:var(--muted)}
  .composer{display:flex;gap:10px;align-items:flex-end}
  .composer textarea{min-height:52px;max-height:180px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .canvasWrap{
    display:grid;gap:10px;align-items:start;
  }
  canvas{max-width:100%;border-radius:24px;border:1px solid var(--line);background:#fff;touch-action:none}
  .stat{
    padding:14px;border-radius:18px;border:1px solid var(--line);background:#fff;
    display:grid;gap:4px
  }
  .stat b{font-size:22px}
  .notice{
    padding:12px 14px;border-radius:18px;border:1px dashed #b8d8c0;background:#f7fbf7;color:#355541
  }
  .modal{
    position:fixed;inset:0;background:rgba(10,18,12,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
  }
  .modal.on{display:flex}
  .modal .card{max-width:520px;width:100%}

</style>

</head>
<body>
<script>

<script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore-compat.js"></script>

<script>

const app = firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const esc = (s='') => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid = () => auth.currentUser?.uid || null;

function nowMs(){ return Date.now(); }
function fmtTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString([], { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
}
function slug(s=''){
  return s.trim().toLowerCase().replace(/^#+/,'').replace(/[^\p{L}\p{N}]+/gu,'-').replace(/^-+|-+$/g,'').slice(0,42);
}
function parseTags(text=''){
  return [...new Set(text.split(',').map(x => x.trim()).map(x => x.replace(/^#+/,'')).map(slug).filter(Boolean))];
}
function parseList(text=''){
  return [...new Set(text.split(',').map(x => x.trim()).filter(Boolean))].slice(0,30);
}
async function upsertOwnProfile(partial, merge=true){
  const me = auth.currentUser;
  if(!me) throw new Error('not-auth');
  const ref = db.collection('users').doc(me.uid);
  await ref.set({ uid: me.uid, email: me.email || '', ...partial, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge });
}
async function loadOwnProfile(){
  const me = auth.currentUser;
  if(!me) return null;
  const snap = await db.collection('users').doc(me.uid).get();
  return snap.exists ? snap.data() : null;
}
async function ensureProfileBase(){
  const me = auth.currentUser;
  if(!me) return;
  const ref = db.collection('users').doc(me.uid);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      uid: me.uid,
      email: me.email || '',
      nickname: '',
      description: '',
      hashtags: [],
      games: [],
      avatarDataUrl: '',
      nicknameChangedAtMs: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }
}
async function getUser(uid){
  const snap = await db.collection('users').doc(uid).get();
  return snap.exists ? snap.data() : null;
}
function userDisplay(user){
  return user?.nickname || user?.email?.split('@')[0] || user?.uid?.slice(0,6) || 'User';
}
async function signOutSafe(){
  await auth.signOut();
  location.href = 'register.html';
}
function requireAuth(next){
  auth.onAuthStateChanged(async user => {
    if(!user){
      location.href = 'register.html';
      return;
    }
    await ensureProfileBase();
    next?.(user);
  });
}
async function makePairChatId(a,b){
  return [a,b].sort().join('__');
}

</script>

<div class="topbar">
  <div class="brand">
    <div class="logo">V</div>
    <div>
      <div style="font-weight:1000">Vero Chat</div>
      <div class="small muted">отдельный диалог по UID</div>
    </div>
  </div>
  <div class="row">
    <a class="btn secondary" href="app.html">Назад</a>
    <a class="btn secondary" href="profile.html">Профиль</a>
    <a class="btn secondary" href="popular.html">Популярное</a>
    <button class="btn danger" id="logoutBtn">Выйти</button>
  </div>
</div>

<div class="wrap">
  <div class="card chatbox">
    <div class="row" style="justify-content:space-between;align-items:flex-start;gap:12px">
      <div class="row" style="gap:14px">
        <img class="avatar big" id="peerAvatar" alt="avatar">
        <div class="col">
          <div class="chip" id="chatIdChip">chat</div>
          <h2 class="title" id="peerName">...</h2>
          <p class="sub" id="peerMeta">...</p>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn secondary" id="callAudio">Аудио</button>
        <button class="btn secondary" id="callVideo">Видео</button>
        <button class="btn secondary" id="hangupBtn">Сбросить</button>
      </div>
    </div>

    <div class="notice" id="callNotice" style="display:none"></div>

    <div class="messages" id="messages"></div>

    <div class="card pad" style="background:rgba(255,255,255,.66)">
      <div class="composer">
        <textarea class="textarea grow" id="msgInput" placeholder="Написать сообщение..."></textarea>
        <button class="btn" id="sendBtn">Отправить</button>
      </div>
      <div class="small muted" style="margin-top:8px">Enter — отправка, Shift+Enter — новая строка.</div>
    </div>
  </div>
</div>

<div class="modal" id="incomingModal">
  <div class="card pad">
    <h2 class="title" style="margin-bottom:6px">Входящий звонок</h2>
    <p class="sub" id="incomingText">Кто-то звонит.</p>
    <div class="row">
      <button class="btn block" id="acceptCall">Принять</button>
      <button class="btn secondary block" id="declineCall">Отклонить</button>
    </div>
  </div>
</div>

<script>

let me = null;
let peerUid = new URLSearchParams(location.search).get('uid');
let peer = null;
let chatId = null;
let unsubMessages = null;
let unsubCall = null;
let pc = null;
let localStream = null;
let callRole = null; // caller or callee
let activeCallId = null;

function showCallNotice(txt){
  const box = $('#callNotice');
  box.style.display = 'block';
  box.textContent = txt;
}
function hideCallNotice(){ $('#callNotice').style.display = 'none'; }

function createPeerConnection(){
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: ['stun:stun.l.google.com:19302'] },
      { urls: ['stun:global.stun.twilio.com:3478?transport=udp'] }
    ]
  });

  pc.onicecandidate = async event => {
    if(!event.candidate || !activeCallId || !callRole) return;
    const field = callRole === 'caller' ? 'callerCandidates' : 'calleeCandidates';
    await db.collection('calls').doc(activeCallId).collection(field).add(event.candidate.toJSON());
  };

  pc.ontrack = event => {
    let remote = $('#remoteVideo');
    if(!remote){
      remote = document.createElement('video');
      remote.id = 'remoteVideo';
      remote.autoplay = true;
      remote.playsInline = true;
      remote.style.width = '100%';
      remote.style.maxHeight = '320px';
      remote.style.borderRadius = '20px';
      remote.style.border = '1px solid var(--line)';
      $('#messages').before(remote);
    }
    remote.srcObject = event.streams[0];
  };
}

async function startLocalMedia(kind='video'){
  const constraints = kind === 'audio'
    ? { audio: true, video: false }
    : { audio: true, video: true };
  localStream = await navigator.mediaDevices.getUserMedia(constraints);
  createPeerConnection();
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  let local = $('#localVideo');
  if(!local){
    local = document.createElement('video');
    local.id = 'localVideo';
    local.autoplay = true;
    local.muted = true;
    local.playsInline = true;
    local.style.width = '180px';
    local.style.position = 'fixed';
    local.style.right = '18px';
    local.style.bottom = '18px';
    local.style.zIndex = '40';
    local.style.borderRadius = '18px';
    local.style.border = '1px solid var(--line)';
    local.style.boxShadow = 'var(--shadow)';
    document.body.appendChild(local);
  }
  local.srcObject = localStream;
}

async function ensureChat(){
  chatId = await makePairChatId(me.uid, peerUid);
  $('#chatIdChip').textContent = chatId;
  const ref = db.collection('chats').doc(chatId);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      participants: [me.uid, peerUid],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: ''
    });
  }
  return ref;
}

async function loadPeer(){
  peer = await getUser(peerUid);
  $('#peerName').textContent = peer ? userDisplay(peer) : 'Пользователь';
  $('#peerMeta').textContent = peer ? (peer.description || peer.email || peer.uid) : peerUid;
  $('#peerAvatar').src = peer?.avatarDataUrl || 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256"><rect width="256" height="256" rx="40" fill="#e8f4eb"/><text x="50%" y="54%" font-size="92" text-anchor="middle" fill="#2fa45a" font-family="Arial" font-weight="700">V</text></svg>`);
}

function renderMessages(docs){
  $('#messages').innerHTML = docs.map(d => {
    const data = d.data();
    const mine = data.senderId === me.uid;
    return `<div class="msg ${mine ? 'me' : ''}">
      <div>${esc(data.text || '')}</div>
      <span class="time">${esc(fmtTime(data.createdAt))}</span>
    </div>`;
  }).join('');
  const box = $('#messages');
  box.scrollTop = box.scrollHeight;
}

async function sendMessage(){
  const text = $('#msgInput').value.trim();
  if(!text) return;
  const ref = db.collection('chats').doc(chatId);
  const msgRef = ref.collection('messages').doc();
  await msgRef.set({
    text,
    senderId: me.uid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  await ref.set({
    lastMessage: text.slice(0,200),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    lastSenderId: me.uid
  }, { merge: true });
  $('#msgInput').value = '';
}

async function startCall(kind='video'){
  try{
    await startLocalMedia(kind);
    callRole = 'caller';
    activeCallId = chatId;
    const callRef = db.collection('calls').doc(activeCallId);
    await callRef.set({
      chatId,
      callerId: me.uid,
      calleeId: peerUid,
      kind,
      status: 'ringing',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await callRef.set({
      offer: { type: offer.type, sdp: offer.sdp },
      status: 'ringing'
    }, { merge: true });

    callRef.collection('calleeCandidates').onSnapshot(snapshot => {
      snapshot.docChanges().forEach(change => {
        if(change.type === 'added'){
          pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
        }
      });
    });

    unsubCall = callRef.onSnapshot(async snap => {
      const data = snap.data() || {};
      if(data.answer && !pc.currentRemoteDescription){
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        showCallNotice('Звонок подключён.');
      }
      if(data.status === 'ended') hangup(false);
    });
    showCallNotice('Звонок идёт...');
  }catch(err){
    alert(err.message);
  }
}

async function acceptCall(callData){
  callRole = 'callee';
  activeCallId = chatId;
  await startLocalMedia(callData.kind || 'video');
  const callRef = db.collection('calls').doc(activeCallId);

  const offerDesc = new RTCSessionDescription(callData.offer);
  await pc.setRemoteDescription(offerDesc);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await callRef.set({
    answer: { type: answer.type, sdp: answer.sdp },
    status: 'active'
  }, { merge: true });

  callRef.collection('callerCandidates').onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
      if(change.type === 'added'){
        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
      }
    });
  });

  unsubCall = callRef.onSnapshot(snap => {
    const data = snap.data() || {};
    if(data.status === 'ended') hangup(false);
  });
  $('#incomingModal').classList.remove('on');
  showCallNotice('Вы приняли звонок.');
}

async function hangup(updateRemote=true){
  try{
    if(activeCallId){
      const callRef = db.collection('calls').doc(activeCallId);
      if(updateRemote){
        await callRef.set({ status:'ended', endedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      }
    }
  } catch(e){}
  try{ unsubCall && unsubCall(); } catch(e){}
  try{ pc && pc.close(); } catch(e){}
  try{ localStream && localStream.getTracks().forEach(t => t.stop()); } catch(e){}
  const lv = $('#localVideo'); if(lv) lv.remove();
  const rv = $('#remoteVideo'); if(rv) rv.remove();
  pc = null; localStream = null; activeCallId = null; callRole = null;
  hideCallNotice();
}

requireAuth(async (user) => {
  me = user;
  if(!peerUid) { alert('Не указан UID'); location.href='app.html'; return; }
  if(peerUid === me.uid){ alert('Это твой UID'); location.href='app.html'; return; }

  $('#logoutBtn').onclick = signOutSafe;
  await ensureChat();
  await loadPeer();

  const msgQuery = db.collection('chats').doc(chatId).collection('messages').orderBy('createdAt', 'asc');
  unsubMessages = msgQuery.onSnapshot(snapshot => renderMessages(snapshot.docs));

  $('#sendBtn').onclick = sendMessage;
  $('#msgInput').addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  $('#callAudio').onclick = () => startCall('audio');
  $('#callVideo').onclick = () => startCall('video');
  $('#hangupBtn').onclick = () => hangup(true);

  const callRef = db.collection('calls').doc(chatId);
  unsubCall = callRef.onSnapshot(snap => {
    const data = snap.data();
    if(!data) return;
    if(data.callerId !== me.uid && data.status === 'ringing' && data.offer){
      $('#incomingText').textContent = `Звонок от ${userDisplay(peer)} (${data.kind === 'audio' ? 'аудио' : 'видео'})`;
      $('#incomingModal').classList.add('on');
      $('#acceptCall').onclick = () => acceptCall(data);
      $('#declineCall').onclick = async () => {
        await callRef.set({ status:'declined', endedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        $('#incomingModal').classList.remove('on');
      };
    }
    if(data.status === 'active') showCallNotice('Звонок активен.');
    if(data.status === 'ended') hangup(false);
  });
});

</script>
</body>
</html>
