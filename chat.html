<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vero • чат</title>
<style>
:root{
  --bg:#eef4ef;
  --bg2:#f7faf7;
  --panel:#ffffff;
  --panel2:#f2f7f2;
  --line:#dbe6db;
  --text:#122017;
  --muted:#5f7264;
  --accent:#2fa45a;
  --accent2:#1f7f42;
  --danger:#c94f4f;
  --shadow:0 16px 40px rgba(24, 44, 28, .08);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(47,164,90,.14), transparent 34%),
    radial-gradient(circle at bottom right, rgba(47,164,90,.08), transparent 28%),
    linear-gradient(180deg, var(--bg), #f8fbf8);
  color:var(--text);
}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
.wrap{max-width:1220px;margin:0 auto;padding:18px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:20;
  backdrop-filter: blur(12px);
  background: rgba(238,244,239,.78);
  border-bottom:1px solid rgba(219,230,219,.9);
  padding:14px 18px;
}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.2px}
.logo{
  width:42px;height:42px;border-radius:14px;
  background: linear-gradient(145deg, var(--accent), #9be0b5);
  box-shadow: 0 10px 30px rgba(47,164,90,.22);
  display:grid;place-items:center;color:white;font-weight:900;
}
.shell{display:grid;grid-template-columns:330px 1fr;gap:18px;padding-top:18px}
@media (max-width: 980px){ .shell{grid-template-columns:1fr} .topbar{flex-wrap:wrap} }
.card{
  background:rgba(255,255,255,.84);
  border:1px solid rgba(219,230,219,.95);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.card.pad{padding:16px}
.stack{display:grid;gap:12px}
.muted{color:var(--muted)}
.title{font-size:20px;font-weight:900;margin:0}
.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.4}
.btn{
  border:0;border-radius:16px;padding:12px 16px;
  background:var(--accent);color:white;font-weight:800;cursor:pointer;
  box-shadow:0 10px 20px rgba(47,164,90,.18);
}
.btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.danger{background:var(--danger)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.block{width:100%}
.input, .textarea, .select{
  width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.96);
  color:var(--text);padding:12px 14px;outline:none;
}
.textarea{min-height:120px;resize:vertical}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.grow{flex:1}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:999px;background:#edf7f0;border:1px solid #cce7d3;
  font-size:13px;font-weight:700;color:#215c34;
}
.pill{
  display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;
  background:#f3f7f4;border:1px solid var(--line);font-size:12px;color:var(--muted)
}
.list{display:grid;gap:10px}
.item{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;border:1px solid var(--line);
  background:rgba(255,255,255,.78);cursor:pointer;
}
.item:hover{transform:translateY(-1px)}
.avatar{
  width:46px;height:46px;border-radius:16px;flex:0 0 auto;object-fit:cover;background:#e8eee9;
  border:1px solid #d6e0d7;
}
.avatar.big{width:96px;height:96px;border-radius:28px}
.col{display:grid;gap:4px;min-width:0}
.name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.desc{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{
  padding:10px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);
  font-weight:800;cursor:pointer
}
.tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width: 700px){ .grid2{grid-template-columns:1fr} }
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media (max-width: 900px){ .grid3{grid-template-columns:1fr} }
.divider{height:1px;background:var(--line);margin:12px 0}
.small{font-size:12px}
.mini{font-size:11px;color:var(--muted)}
.kbd{font-family:ui-monospace, SFMono-Regular, Menlo, monospace;background:#f4f7f4;border:1px solid var(--line);padding:2px 6px;border-radius:8px}
.hero{
  padding:18px;border-radius:28px;background:linear-gradient(135deg, rgba(47,164,90,.10), rgba(255,255,255,.80));
  border:1px solid rgba(205,229,212,.95);
}
.chatbox{
  display:grid;grid-template-rows:auto 1fr auto;min-height:calc(100vh - 110px);
  gap:12px;padding:16px;
}
.messages{
  display:flex;flex-direction:column;gap:10px;overflow:auto;padding-right:4px;min-height:40vh;
}
.msg{
  max-width:min(740px, 85%);padding:11px 13px;border-radius:18px;border:1px solid var(--line);
  background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.03)
}
.msg.me{margin-left:auto;background:#ebf8ef;border-color:#cde5d4}
.msg .time{display:block;margin-top:4px;font-size:11px;color:var(--muted)}
.composer{display:flex;gap:10px;align-items:flex-end}
.composer textarea{min-height:56px;max-height:180px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.notice{
  padding:12px 14px;border-radius:18px;border:1px dashed #b8d8c0;background:#f7fbf7;color:#355541
}
.modal{
  position:fixed;inset:0;background:rgba(10,18,12,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
}
.modal.on{display:flex}
.modal .card{max-width:560px;width:100%}
.tagbox{display:flex;flex-wrap:wrap;gap:8px}
.tagbox .chip{cursor:pointer}
.callpanel{
  position:relative;display:none;gap:10px;padding:12px;border:1px solid var(--line);border-radius:22px;background:#fff;
}
.callpanel.on{display:grid}
.videoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width: 700px){ .videoGrid{grid-template-columns:1fr} }
video{width:100%;max-height:280px;background:#101816;border-radius:18px;object-fit:cover}
canvas{max-width:100%;border-radius:24px;border:1px solid var(--line);background:#fff;touch-action:none}
</style>
</head>
<body>
<script>
const FIREBASE_CONFIG = {
  "apiKey": "AIzaSyDGUSKBiKvEqSOg6QqY6iHC94C-SoxAujQ",
  "authDomain": "veromesendger.firebaseapp.com",
  "projectId": "veromesendger",
  "storageBucket": "veromesendger.firebasestorage.app",
  "messagingSenderId": "424869261701",
  "appId": "1:424869261701:web:289a4b7e386b960d6314ec",
  "measurementId": "G-C63GM9P098"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
db.settings({ ignoreUndefinedProperties: true });

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const esc = (s='') => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid = () => auth.currentUser?.uid || null;
const nowMs = () => Date.now();

function cleanNick(text='') {
  return String(text).trim().replace(/^@+/, '').replace(/\s+/g, ' ').slice(0, 24);
}

function slug(text='') {
  return String(text).trim().toLowerCase()
    .replace(/^#+/, '')
    .replace(/[^\p{L}\p{N}]+/gu, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 42);
}

function parseCSV(text='') {
  return [...new Set(String(text).split(',').map(x => x.trim()).filter(Boolean))].slice(0, 30);
}

function parseTags(text='') {
  return [...new Set(String(text).split(',').map(x => x.trim()).map(x => x.replace(/^#+/, '')).map(slug).filter(Boolean))];
}

function userName(u) {
  return u?.nickname || u?.displayName || u?.email?.split('@')[0] || 'Без ника';
}

function avatarFallback(letter='V') {
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(`\
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2fa45a"/>
      <stop offset="1" stop-color="#9be0b5"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="44" fill="#eef6f0"/>
  <circle cx="128" cy="128" r="82" fill="url(#g)" opacity=".92"/>
  <text x="50%" y="56%" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-family="Arial, sans-serif" font-size="84" font-weight="700">__LETTER__</text>
</svg>`).replace('__LETTER__', letter);
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString([], { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function lastSeenText(ms) {
  if (!ms) return 'офлайн';
  const diff = nowMs() - ms;
  if (diff < 2 * 60 * 1000) return 'онлайн';
  if (diff < 60 * 60 * 1000) return 'был(а) недавно';
  return 'офлайн';
}

async function loadProfile(id) {
  const snap = await db.collection('users').doc(id).get();
  return snap.exists ? snap.data() : null;
}

async function ensureOwnProfile() {
  const me = auth.currentUser;
  if (!me) return null;
  const ref = db.collection('users').doc(me.uid);
  const snap = await ref.get();
  if (!snap.exists) {
    const nickFromGoogle = cleanNick(me.displayName || me.email?.split('@')[0] || '');
    await ref.set({
      uid: me.uid,
      email: me.email || '',
      nickname: nickFromGoogle,
      nicknameChangedAtMs: 0,
      description: '',
      hashtags: [],
      games: [],
      avatarDataUrl: '',
      lastSeen: nowMs(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } else {
    await ref.set({
      uid: me.uid,
      email: me.email || '',
      lastSeen: nowMs(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }
  return await loadProfile(me.uid);
}

async function saveOwnProfile(partial) {
  const me = auth.currentUser;
  if (!me) throw new Error('not-auth');
  await db.collection('users').doc(me.uid).set({
    uid: me.uid,
    email: me.email || '',
    ...partial,
    lastSeen: nowMs(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}

async function signOutSafe() {
  await auth.signOut();
  location.href = 'register.html';
}

function chatIdFor(a, b) {
  return [a, b].sort().join('__');
}

function asNickQuery(q='') {
  return String(q).trim().toLowerCase().replace(/^@+/, '');
}

async function pingPresence() {
  const me = auth.currentUser;
  if (!me) return;
  try {
    await db.collection('users').doc(me.uid).set({
      lastSeen: nowMs(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } catch (e) {}
}

function startPresenceHeartbeat() {
  pingPresence();
  const t = setInterval(pingPresence, 45000);
  window.addEventListener('beforeunload', () => clearInterval(t));
}

function el(tag, attrs={}, html='') {
  const node = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (v === null || v === undefined) return;
    if (k === 'class') node.className = v;
    else if (k === 'text') node.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  });
  if (html) node.innerHTML = html;
  return node;
}

function readQuery() {
  const p = new URLSearchParams(location.search);
  return {
    uid: p.get('uid') || p.get('u') || '',
    tab: p.get('tab') || ''
  };
}

function goToChat(otherUid) {
  location.href = `chat.html?u=${encodeURIComponent(otherUid)}`;
}

function safeText(text='') {
  return String(text).replace(/\s+/g, ' ').trim();
}
</script>

<div class="wrap">
  <div class="card chatbox">
    <div class="row" style="justify-content:space-between;align-items:flex-start;gap:12px">

        <img class="avatar big" id="peerAvatar" alt="avatar">

<script>
const query = readQuery();
let me = null;
let peerUid = query.uid || '';
let peer = null;
let chatId = null;
let unsubMessages = null;
let unsubCall = null;
let pc = null;
let localStream = null;
let activeCallId = null;
let videoEnabled = true;
let callRole = null;

function showNotice(text) {
  const box = $('#callNotice');
  box.style.display = 'block';
  box.textContent = text;
}
function hideNotice() {
  $('#callNotice').style.display = 'none';
}
function setCallPanel(on) {
  $('#callPanel').classList.toggle('on', !!on);
}
function stopTracks(stream) {
  if (!stream) return;
  stream.getTracks().forEach(t => t.stop());
}
function cleanupPeer() {
  try { pc && pc.close(); } catch (e) {}
  pc = null;
}
async function startLocalMedia() {
  const constraints = { audio: true, video: true };
  try {
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEnabled = true;
  } catch (e) {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    videoEnabled = false;
  }
  const local = $('#localVideo');
  local.srcObject = localStream;
  $('#switchModeBtn').textContent = videoEnabled ? 'Видео' : 'Аудио';
}
async function makePc() {
  cleanupPeer();
  pc = new RTCPeerConnection({
    iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
  });
  pc.onicecandidate = async (event) => {
    if (!event.candidate || !activeCallId || !callRole) return;
    try {
      await db.collection('calls').doc(activeCallId).collection(callRole === 'caller' ? 'callerCandidates' : 'calleeCandidates').add(event.candidate.toJSON());
    } catch (e) {}
  };
  pc.ontrack = (event) => {
    const remote = $('#remoteVideo');
    if (remote.srcObject !== event.streams[0]) remote.srcObject = event.streams[0];
  };
  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }
}
async function ensureChat() {
  if (!peerUid) return;
  chatId = chatIdFor(me.uid, peerUid);
  const ref = db.collection('chats').doc(chatId);
  const snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      participants: [me.uid, peerUid],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: '',
      lastSenderId: '',
    }, { merge: true });
  } else {
    await ref.set({
      participants: [me.uid, peerUid],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }
}
async function loadPeer() {
  peer = await loadProfile(peerUid);
  $('#peerName').textContent = userName(peer);
  $('#peerMeta').textContent = peer?.description || 'Без описания';
  $('#peerAvatar').src = peer?.avatarDataUrl || avatarFallback((userName(peer)[0] || 'V').toUpperCase());
  $('#peerTags').innerHTML = `
    ${(peer?.hashtags || []).slice(0,6).map(t => `<span class="chip">#${esc(t)}</span>`).join('')}
    ${(peer?.games || []).slice(0,4).map(t => `<span class="chip">${esc(t)}</span>`).join('')}
  `;
}
function renderMessages(items) {
  const box = $('#messages');
  box.innerHTML = '';
  items.forEach(m => {
    const mine = m.senderId === me.uid;
    const row = el('div', { class: 'msg' + (mine ? ' me' : '') });
    row.innerHTML = `${esc(m.text || '')}<span class="time">${esc(fmtTime(m.createdAt))}</span>`;
    box.appendChild(row);
  });
  box.scrollTop = box.scrollHeight;
}
async function sendMessage() {
  const text = $('#msgInput').value.trim();
  if (!text || !chatId) return;
  const ref = db.collection('chats').doc(chatId);
  const msgRef = ref.collection('messages').doc();
  await ref.set({
    participants: [me.uid, peerUid],
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    lastMessage: text,
    lastSenderId: me.uid
  }, { merge: true });
  await msgRef.set({
    senderId: me.uid,
    text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  $('#msgInput').value = '';
}
async function toggleVideo() {
  if (!localStream) return;
  const vTrack = localStream.getVideoTracks()[0];
  if (!vTrack) {
    await startLocalMedia();
    if (pc) {
      pc.getSenders().forEach(s => {
        if (s.track && s.track.kind === 'audio') return;
      });
      localStream.getTracks().forEach(track => {
        if (!pc.getSenders().find(s => s.track && s.track.kind === track.kind)) pc.addTrack(track, localStream);
      });
    }
    videoEnabled = true;
    $('#switchModeBtn').textContent = 'Видео';
    return;
  }
  videoEnabled = !videoEnabled;
  vTrack.enabled = videoEnabled;
  $('#switchModeBtn').textContent = videoEnabled ? 'Видео' : 'Аудио';
}
async function startCall() {
  if (!peerUid || peerUid === me.uid) return;
  callRole = 'caller';
  setCallPanel(true);
  showNotice('Звонок идёт.');
  activeCallId = chatId;
  await startLocalMedia();
  await makePc();
  const callRef = db.collection('calls').doc(activeCallId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await callRef.set({
    chatId,
    callerId: me.uid,
    calleeId: peerUid,
    status: 'ringing',
    mode: videoEnabled ? 'video' : 'audio',
    offer: offer.toJSON(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });

  callRef.collection('calleeCandidates').onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
      if (change.type === 'added') {
        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
      }
    });
  });

  unsubCall = callRef.onSnapshot(async snap => {
    const data = snap.data() || {};
    if (data.answer && pc && pc.signalingState !== 'stable') {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer)).catch(() => {});
    }
    if (data.status === 'active') showNotice('Звонок активен.');
    if (data.status === 'ended') endCall(false);
  });
}
async function acceptCall(data) {
  callRole = 'callee';
  activeCallId = chatId;
  setCallPanel(true);
  await startLocalMedia();
  await makePc();
  const callRef = db.collection('calls').doc(activeCallId);
  await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await callRef.set({
    chatId,
    callerId: data.callerId,
    calleeId: me.uid,
    status: 'active',
    mode: data.mode || 'video',
    answer: answer.toJSON(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });

  callRef.collection('callerCandidates').onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
      if (change.type === 'added') {
        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
      }
    });
  });

  unsubCall = callRef.onSnapshot(snap => {
    const d = snap.data() || {};
    if (d.status === 'ended') endCall(false);
  });
  $('#incomingModal').classList.remove('on');
  showNotice('Звонок подключён.');
}
async function endCall(updateRemote=true) {
  if (updateRemote && activeCallId) {
    try {
      await db.collection('calls').doc(activeCallId).set({
        status: 'ended',
        endedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    } catch (e) {}
  }
  try { unsubCall && unsubCall(); } catch (e) {}
  unsubCall = null;
  callRole = null;
  stopTracks(localStream);
  localStream = null;
  $('#localVideo').srcObject = null;
  $('#remoteVideo').srcObject = null;
  cleanupPeer();
  activeCallId = null;
  setCallPanel(false);
  hideNotice();
}

requireAuth(async (user) => {
  me = user;
  startPresenceHeartbeat();
  $('#logoutBtn').onclick = signOutSafe;
  $('#hangupBtn').onclick = () => endCall(true);
  $('#callBtn').onclick = startCall;
  $('#switchModeBtn').onclick = toggleVideo;

  if (!peerUid) {
    location.href = 'app.html';
    return;
  }
  if (peerUid === me.uid) {
    location.href = 'app.html';
    return;
  }

  await ensureOwnProfile();
  await ensureChat();
  await loadPeer();

  const msgQuery = db.collection('chats').doc(chatId).collection('messages').orderBy('createdAt', 'asc');
  unsubMessages = msgQuery.onSnapshot(snap => {
    renderMessages(snap.docs.map(d => d.data()));
  });

  $('#sendBtn').onclick = sendMessage;
  $('#msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  const callRef = db.collection('calls').doc(chatId);
  unsubCall = callRef.onSnapshot(snap => {
    const data = snap.data() || {};
    if (data.callerId !== me.uid && data.status === 'ringing' && data.offer) {
      $('#incomingText').textContent = `Звонит ${userName(peer)}`;
      $('#incomingModal').classList.add('on');
      $('#acceptCall').onclick = () => acceptCall(data);
      $('#declineCall').onclick = async () => {
        await callRef.set({ status:'ended', updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        $('#incomingModal').classList.remove('on');
      };
    }
    if (data.status === 'active') showNotice('Звонок активен.');
    if (data.status === 'ended') {
      $('#incomingModal').classList.remove('on');
    }
  });
});

window.addEventListener('beforeunload', () => {
  try { unsubMessages && unsubMessages(); } catch (e) {}
  try { unsubCall && unsubCall(); } catch (e) {}
});
startPresenceHeartbeat();
</script>
</body>
</html>
