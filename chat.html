<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<link rel="apple-touch-icon" href="favicon.png" />

<style>

:root{
  --bg:#eef4ef;
  --bg2:#f7faf7;
  --panel:#ffffff;
  --panel2:#f2f7f2;
  --line:#dbe6db;
  --text:#122017;
  --muted:#5f7264;
  --accent:#2fa45a;
  --accent2:#1f7f42;
  --danger:#c94f4f;
  --shadow:0 16px 40px rgba(24, 44, 28, .08);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(47,164,90,.14), transparent 34%),
    radial-gradient(circle at bottom right, rgba(47,164,90,.08), transparent 28%),
    linear-gradient(180deg, var(--bg), #f8fbf8);
  color:var(--text);
}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
.wrap{max-width:1280px;margin:0 auto;padding:18px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:20;
  backdrop-filter: blur(12px);
  background: rgba(238,244,239,.78);
  border-bottom:1px solid rgba(219,230,219,.9);
  padding:14px 18px;
}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.2px}
.logo{
  width:42px;height:42px;border-radius:14px;
  background: linear-gradient(145deg, var(--accent), #9be0b5);
  box-shadow: 0 10px 30px rgba(47,164,90,.22);
  display:grid;place-items:center;color:white;font-weight:900;
}
.shell{display:grid;grid-template-columns:360px 1fr;gap:18px;padding-top:18px}
@media (max-width: 980px){ .shell{grid-template-columns:1fr} .topbar{flex-wrap:wrap} }
.card{
  background:rgba(255,255,255,.84);
  border:1px solid rgba(219,230,219,.95);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.card.pad{padding:16px}
.stack{display:grid;gap:12px}
.muted{color:var(--muted)}
.title{font-size:20px;font-weight:900;margin:0}
.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.4}
.btn{
  border:0;border-radius:16px;padding:12px 16px;
  background:var(--accent);color:white;font-weight:800;cursor:pointer;
  box-shadow:0 10px 20px rgba(47,164,90,.18);
}
.btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.danger{background:var(--danger)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.block{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed}
.input, .textarea, .select{
  width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.96);
  color:var(--text);padding:12px 14px;outline:none;
}
.textarea{min-height:120px;resize:vertical}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.grow{flex:1}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:999px;background:#edf7f0;border:1px solid #cce7d3;
  font-size:13px;font-weight:700;color:#215c34;
}
.chip.soft{background:#f4f7f4;border-color:#dee6df;color:#4f6756}
.chip.clickable{cursor:pointer}
.pill{
  display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;
  background:#f3f7f4;border:1px solid var(--line);font-size:12px;color:var(--muted)
}
.list{display:grid;gap:10px}
.item{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;border:1px solid var(--line);
  background:rgba(255,255,255,.78);cursor:pointer;
}
.item:hover{transform:translateY(-1px)}
.avatar{
  width:46px;height:46px;border-radius:16px;flex:0 0 auto;object-fit:cover;background:#e8eee9;
  border:1px solid #d6e0d7;
}
.avatar.big{width:96px;height:96px;border-radius:28px}
.avatar.tiny{width:28px;height:28px;border-radius:10px}
.col{display:grid;gap:4px;min-width:0}
.name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.desc{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{
  padding:10px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);
  font-weight:800;cursor:pointer
}
.tab.active{background:linear-gradient(145deg, rgba(47,164,90,.16), rgba(47,164,90,.04));color:var(--accent2);border-color:#b8dfc1}
.hero{
  display:grid;gap:14px;padding:18px;border-radius:26px;
  background:linear-gradient(135deg, rgba(47,164,90,.13), rgba(255,255,255,.86));
  border:1px solid rgba(184,223,193,.9);
}
.hero h1{margin:0;font-size:30px;line-height:1.05}
.hero p{margin:0;color:var(--muted);max-width:62ch}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width: 700px){ .grid2{grid-template-columns:1fr} }
.panel-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.sep{height:1px;background:var(--line);margin:12px 0}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;background:#e9f6ed;color:#2f7a45;font-size:12px;font-weight:800}
.small{font-size:12px;color:var(--muted)}
.empty{padding:18px;border:1px dashed #cfd9d0;border-radius:18px;background:rgba(255,255,255,.5);color:var(--muted);text-align:center}
.avatarBox{display:grid;gap:12px;justify-items:start}
.canvasWrap{border:1px solid var(--line);border-radius:22px;overflow:hidden;background:white}
canvas{display:block;touch-action:none}
.msgs{display:grid;gap:10px;max-height:62vh;overflow:auto;padding-right:4px}
.msg{
  max-width:78%;padding:12px 14px;border-radius:18px;border:1px solid var(--line);background:#fff;box-shadow:0 6px 18px rgba(24,44,28,.05);
}
.msg.me{margin-left:auto;background:#edf8f0;border-color:#cfe8d5}
.msg .meta{margin-top:6px;font-size:11px;color:var(--muted)}

.msg .meta{margin-top:6px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.msg .seen{font-weight:800;color:var(--accent2)}
.msg .delMsg{border:none;background:transparent;color:var(--danger);font-size:11px;padding:0;cursor:pointer}
.msg .delMsg:hover{text-decoration:underline}
.chatHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px}
.chatPeer{display:flex;align-items:center;gap:12px;min-width:0}
.chatPeer .col{min-width:0}
.toolbar{display:flex;gap:10px;flex-wrap:wrap}
.callOverlay{
  position:fixed;inset:0;background:rgba(11,17,13,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
}
.callCard{
  width:min(980px, 100%);
  background:rgba(255,255,255,.96);border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.35);
  box-shadow:0 30px 80px rgba(0,0,0,.28);
}
.callTop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
.callBody{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
@media (max-width: 850px){ .callBody{grid-template-columns:1fr} }
.videobox{position:relative;border-radius:22px;overflow:hidden;background:#09110b;min-height:240px;border:1px solid #dfe7e0}
.videobox video{width:100%;height:100%;object-fit:cover;display:block}
.videolabel{position:absolute;left:12px;top:12px;z-index:2;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.45);color:white;font-size:12px}
.callControls{display:flex;gap:10px;flex-wrap:wrap;padding:0 14px 14px}
.callActions{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:0 14px 14px}
.kbd{font-size:12px;color:var(--muted);padding:6px 8px;border:1px solid var(--line);border-radius:10px;background:#fafcfa}
.notice{padding:12px 14px;border-radius:16px;background:#fff8e7;border:1px solid #f0ddb0;color:#745b17}
.offscreen-audio{
  position:fixed;
  left:-9999px;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

</style>
</head>

<div class="topbar">
  <div class="brand"><div class="logo">V</div><div><div>Vero</div><div class="small">чат</div></div></div>

</div>

  <div class="card">

      <div class="chatPeer" id="peerHead"></div>

        <button id="callBtn" class="btn">Звонок</button>

      <div id="notice" class="notice" style="display:none"></div>
      <div id="msgs" class="msgs"></div>
      <div class="row wrap">

      </div>

  </div>
</div>

<div id="callOverlay" class="callOverlay">

    <div class="callTop">
      <div>
        <div class="title" id="callTitle">Звонок</div>
        <div class="small" id="callStatus">Подключение...</div>
      </div>
      <button id="closeCall" class="btn secondary">Закрыть</button>
    </div>
    <div class="callBody">
      <div class="videobox">
        <div class="videolabel">Ты</div>
        <video id="localVideo" autoplay muted playsinline></video>

      <span class="kbd">WebRTC-звонок</span>
      <button id="endCall" class="btn danger">Сбросить</button>
    </div>
  </div>
</div>

<script>

const firebaseConfig = {
  "apiKey": "AIzaSyDGUSKBiKvEqSOg6QqY6iHC94C-SoxAujQ",
  "authDomain": "veromesendger.firebaseapp.com",

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const users = db.collection('users');
const chats = db.collection('chats');
const calls = db.collection('calls');

const GAME_SUGGESTIONS = ['Half-Life','Half-Life 2','Portal','Portal 2','Team Fortress 2','Counter-Strike 2','Minecraft','Roblox','GTA V','GTA San Andreas','Terraria','Rust','Fortnite','Valorant','Dota 2','CS:GO','Among Us','Phasmophobia','Lethal Company','The Binding of Isaac','Hades','Stardew Valley'];
const TAG_SUGGESTIONS = ['#art','#gaming','#meme','#music','#anime','#programming','#friends','#chat','#design','#edit'];

const DAY_MS = 86400000;

function nickKey(v){
  return String(v || '').trim().toLowerCase().replace(/\s+/g,' ');
}
function cleanNick(v){
  return String(v || '').trim().replace(/^@+/, '').replace(/\s+/g,' ').slice(0,24);
}
function asList(v){
  if (Array.isArray(v)) return v;
  if (!v) return [];
  return String(v).split(',').map(s => s.trim()).filter(Boolean);
}
function formatTime(v){
  if (!v || !v.toDate) return '';
  return new Intl.DateTimeFormat('ru-RU', {hour:'2-digit', minute:'2-digit'}).format(v.toDate());
}
function formatDate(v){
  if (!v || !v.toDate) return '';
  return new Intl.DateTimeFormat('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'}).format(v.toDate());
}
function initials(nick){
  const p = String(nick || '?').trim().split(/\s+/).filter(Boolean);
  const a = (p[0] || '?')[0] || '?';
  const b = (p[1] || '')[0] || '';
  return (a + b).toUpperCase();
}
function avatarHtml(profile, extraClass=''){
  const cls = `avatar ${extraClass}`.trim();
  const alt = (profile && profile.nick) ? profile.nick : 'avatar';
  if (profile && profile.avatarData) return `<img class="${cls}" src="${profile.avatarData}" alt="${alt}">`;
  if (profile && profile.photoURL) return `<img class="${cls}" src="${profile.photoURL}" alt="${alt}">`;
  return `<div class="${cls}" style="display:grid;place-items:center;background:linear-gradient(145deg, rgba(47,164,90,.18), rgba(47,164,90,.05));color:#235d34;font-weight:900">${initials(profile && profile.nick ? profile.nick : '?')}</div>`;
}
function chatIdFor(a, b){
  return [a, b].sort().join('__');
}
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function requireAuth(onReady){
  auth.onAuthStateChanged(async user => {
    if (!user) {
      location.href = 'register.html';
      return;
    }
    await touchPresence(user);
    if (onReady) onReady(user);
  });
}
async function touchPresence(user){
  const ref = users.doc(user.uid);
  const snap = await ref.get();
  const base = snap.exists ? (snap.data() || {}) : {};
  const nick = base.nick || user.displayName || (user.email ? user.email.split('@')[0] : 'user');
  await ref.set({
    uid: user.uid,
    email: user.email || base.email || '',
    photoURL: user.photoURL || base.photoURL || '',
    nick,
    nickLower: nickKey(nick),
    avatarData: base.avatarData || '',
    about: base.about || '',
    tags: Array.isArray(base.tags) ? base.tags : [],
    games: Array.isArray(base.games) ? base.games : [],
    lastNickChangeAt: base.lastNickChangeAt || null,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: base.createdAt || firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}
async function getMe(){
  const user = auth.currentUser;
  if (!user) return null;
  const snap = await users.doc(user.uid).get();
  return { user, data: snap.exists ? snap.data() : null };
}
async function getUser(uid){
  const snap = await users.doc(uid).get();
  return snap.exists ? snap.data() : null;
}
function createTokenChips(container, items, onRemove){
  container.innerHTML = '';
  (items || []).forEach((item, idx) => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.innerHTML = `${esc(item)} <span style="opacity:.7">×</span>`;
    el.title = 'Убрать';
    if (onRemove) el.addEventListener('click', () => onRemove(idx));
    container.appendChild(el);
  });
}
function setText(el, text){ if (el) el.textContent = text ?? ''; }
async function ensureNickUnique(nick, myUid){
  const key = nickKey(nick);
  const q = await users.where('nickLower', '==', key).limit(1).get();
  return q.empty || q.docs[0].id === myUid;
}
async function createOrUpdateProfile(user, nickOverride){
  const ref = users.doc(user.uid);
  const snap = await ref.get();
  const current = snap.exists ? snap.data() : {};
  const chosen = cleanNick(nickOverride || current.nick || user.displayName || (user.email ? user.email.split('@')[0] : 'user'));
  if (!chosen) throw new Error('Ник пустой');
  if (!(await ensureNickUnique(chosen, user.uid))) throw new Error('Этот ник уже занят');
  const nickChanged = current.nick && nickKey(current.nick) !== nickKey(chosen);
  if (nickChanged && current.lastNickChangeAt && current.lastNickChangeAt.toDate) {
    const diff = Date.now() - current.lastNickChangeAt.toDate().getTime();
    if (diff < DAY_MS) throw new Error('Ник можно менять только раз в день');
  }
  await ref.set({
    uid: user.uid,
    email: user.email || current.email || '',
    photoURL: user.photoURL || current.photoURL || '',
    nick: chosen,
    nickLower: nickKey(chosen),
    about: current.about || '',
    tags: Array.isArray(current.tags) ? current.tags : [],
    games: Array.isArray(current.games) ? current.games : [],
    avatarData: current.avatarData || '',
    lastNickChangeAt: nickChanged ? firebase.firestore.FieldValue.serverTimestamp() : (current.lastNickChangeAt || null),
    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: current.createdAt || firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}
function openChat(uid){
  location.href = 'chat.html?u=' + encodeURIComponent(uid);
}
function go(url){ location.href = url; }
async function ensureChat(me, peer){
  const id = chatIdFor(me, peer);
  const ref = chats.doc(id);
  const snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      participants: [me, peer],
      participantsKey: id,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: '',
      lastSenderId: ''
    });
  }
  return id;
}
function timeAgo(ts){
  if (!ts || !ts.toDate) return '—';
  const d = ts.toDate().getTime();
  const diff = Date.now() - d;
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'только что';
  if (min < 60) return `${min} мин назад`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h} ч назад`;
  return `${Math.floor(h/24)} дн назад`;
}
function onlineLabel(lastSeen){
  if (!lastSeen || !lastSeen.toDate) return 'неизвестно';
  const diff = Date.now() - lastSeen.toDate().getTime();
  if (diff < 2 * 60 * 1000) return 'сейчас онлайн';
  if (diff < 10 * 60 * 1000) return 'недавно онлайн';
  return timeAgo(lastSeen);
}


const params = new URLSearchParams(location.search);
const peerUid = params.get('u');
const peerHead = document.getElementById('peerHead');
const msgs = document.getElementById('msgs');
const message = document.getElementById('message');
const sendBtn = document.getElementById('send');
const notice = document.getElementById('notice');
const callOverlay = document.getElementById('callOverlay');
const callBtn = document.getElementById('callBtn');
const hangBtn = document.getElementById('hangBtn');
const closeCall = document.getElementById('closeCall');
const callTitle = document.getElementById('callTitle');
const callStatus = document.getElementById('callStatus');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const remoteAudio = document.getElementById('remoteAudio');
const toggleVideo = document.getElementById('toggleVideo');
const toggleMute = document.getElementById('toggleMute');
const endCall = document.getElementById('endCall');
let meUser = null;
let peer = null;
let chatRef = null;
let messageUnsub = null;
let callUnsub = null;
let pc = null;
let localStream = null;
let remoteStream = new MediaStream();
let audioSender = null;
let videoSender = null;
let currentCall = null;
let isVideo = false;
let isMuted = false;
let incomingAnswerAllowed = false;

function showNotice(text){
  if (!text) { notice.style.display = 'none'; notice.textContent = ''; return; }
  notice.style.display = 'block';
  notice.textContent = text;
}
function setCallState(text){ callStatus.textContent = text; }
function resetStreams(){
  if (localVideo) localVideo.srcObject = null;
  if (remoteVideo) remoteVideo.srcObject = null;
  if (remoteAudio) remoteAudio.srcObject = null;
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  remoteStream = new MediaStream();
}
function closeOverlay(){ callOverlay.style.display = 'none'; }
function openOverlay(){ callOverlay.style.display = 'flex'; }
async function safePlayMedia(el){
  if (!el) return;
  try {
    await el.play();
  } catch (e) {
    console.warn('Media play failed:', e);
  }
}
async function bindRemoteMedia(stream){
  if (!stream) return;
  remoteStream = stream;
  if (remoteVideo) {
    remoteVideo.srcObject = stream;
    await safePlayMedia(remoteVideo);
  }
  if (remoteAudio) {
    remoteAudio.muted = false;
    remoteAudio.srcObject = stream;
    await safePlayMedia(remoteAudio);
  }
}
function updateButtons(){
  toggleVideo.textContent = `Видео: ${isVideo ? 'вкл' : 'выкл'}`;
  toggleMute.textContent = `Микрофон: ${isMuted ? 'выкл' : 'вкл'}`;
}
function setLocalVideoStream(){
  localVideo.srcObject = localStream;
}
async function makeConnection(role){
  if (pc) {
    try { pc.close(); } catch (_) {}
  }
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  audioSender = null;
  videoSender = null;
  remoteStream = new MediaStream();

  pc.ontrack = async event => {
    const stream = event.streams && event.streams[0] ? event.streams[0] : null;
    if (stream) {
      await bindRemoteMedia(stream);
      return;
    }
    event.track.onunmute = async () => {
      if (!remoteStream.getTracks().some(t => t.id === event.track.id)) {
        remoteStream.addTrack(event.track);
      }
      await bindRemoteMedia(remoteStream);
    };
  };

  pc.onicecandidate = async event => {
    if (!event.candidate || !currentCall) return;
    const col = role === 'caller' ? 'callerCandidates' : 'calleeCandidates';
    await calls.doc(chatRef.id).collection(col).add(event.candidate.toJSON());
  };
  pc.onconnectionstatechange = () => {
    if (!pc) return;
    if (pc.connectionState === 'connected') setCallState('Соединение установлено');
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') setCallState('Связь потеряна');
  };
}

async function setupLocalMedia(video){
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video });
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  if (localVideo) localVideo.srcObject = localStream;
  if (pc) {
    const audioTrack = localStream.getAudioTracks()[0] || null;
    const videoTrack = localStream.getVideoTracks()[0] || null;
    if (audioTrack) {
      if (audioSender && audioSender.track) {
        await audioSender.replaceTrack(audioTrack);
      } else {
        audioSender = pc.addTrack(audioTrack, localStream);
      }
    }
    if (videoTrack) {
      if (videoSender && videoSender.track) {
        await videoSender.replaceTrack(videoTrack);
      } else {
        videoSender = pc.addTrack(videoTrack, localStream);
      }
    }
  }
  setLocalVideoStream();
  await safePlayMedia(localVideo);
}

async function startCaller(video){
  isVideo = video;
  openOverlay();
  updateButtons();
  incomingAnswerAllowed = false;
  await makeConnection('caller');
  await setupLocalMedia(video);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  currentCall = {
    chatId: chatRef.id,
    callerId: meUser.uid,
    calleeId: peerUid,
    offer: { type: offer.type, sdp: offer.sdp },
    status: 'ringing',
    video: video,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  await calls.doc(chatRef.id).set(currentCall, { merge: true });
  setCallState('Звонок идёт...');
  watchCandidates('calleeCandidates', 'caller');
}
async function acceptIncoming(data){
  isVideo = !!data.video;
  openOverlay();
  updateButtons();
  incomingAnswerAllowed = false;
  await makeConnection('callee');
  await setupLocalMedia(isVideo);
  await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await calls.doc(chatRef.id).set({ status: 'active', answer: { type: answer.type, sdp: answer.sdp }, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  setCallState('Вы в звонке');
  watchCandidates('callerCandidates', 'callee');
}
function watchCandidates(collectionName, role){
  calls.doc(chatRef.id).collection(collectionName).onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
      if (change.type !== 'added') return;
      const cand = new RTCIceCandidate(change.doc.data());
      if (pc) pc.addIceCandidate(cand).catch(() => {});
    });
  });
}
async function endCurrentCall(){
  try{
    await calls.doc(chatRef.id).set({ status: 'ended', endedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  } catch (_) {}
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  remoteStream = new MediaStream();
  if (remoteVideo) remoteVideo.srcObject = null;
  if (remoteAudio) remoteAudio.srcObject = null;
  if (localVideo) localVideo.srcObject = null;
  currentCall = null;
  incomingAnswerAllowed = false;
  closeOverlay();
  setCallState('');
}

async function deleteMessage(id){
  if (!id || !chatRef) return;
  if (!confirm('Удалить сообщение?')) return;
  await chatRef.collection('messages').doc(id).delete();
}

async function markMessagesSeen(list){
  if (!chatRef || !meUser) return;
  const unseen = list.filter(m => m.senderId !== meUser.uid && !m.seenAt && m.id);
  if (!unseen.length) return;
  await Promise.allSettled(unseen.map(m =>
    chatRef.collection('messages').doc(m.id).set({
      seenAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true })
  ));
}

function renderMessages(list){
  msgs.innerHTML = list.length ? list.map(m => {
    const mine = m.senderId === meUser.uid;
    const seen = mine ? (m.seenAt ? '✓✓ просмотрено' : '✓ отправлено') : '';
    return `
    <div class="msg ${mine ? 'me' : ''}">
      <div>${esc(m.text || '')}</div>
      <div class="meta">
        <span>${mine ? 'ты' : esc(peer?.nick || 'он')}</span>
        <span>•</span>
        <span>${formatTime(m.createdAt)}</span>
        ${mine ? `<span class="seen">${seen}</span>` : ''}
        ${mine ? `<button class="delMsg" type="button" onclick="deleteMessage('${m.id}')">Удалить</button>` : ''}
      </div>
    </div>
  `;}).join('') : '<div class="empty">Здесь пока пусто</div>';
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage(){
  const text = message.value.trim();
  if (!text) return;
  await chatRef.collection('messages').add({
    text,
    senderId: meUser.uid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    type: 'text',
    seenAt: null
  });
  await chatRef.set({ lastMessage: text, lastSenderId: meUser.uid, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  message.value = '';
}

callBtn.addEventListener('click', async () => {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert('В этом браузере нет WebRTC');
    return;
  }
  if (currentCall && currentCall.status === 'ringing' && currentCall.calleeId === meUser.uid) {
    await acceptIncoming(currentCall);
    return;
  }
  if (currentCall) return;
  await startCaller(false);
});

hangBtn.addEventListener('click', endCurrentCall);
closeCall.addEventListener('click', () => { if (!currentCall) closeOverlay(); else endCurrentCall(); });
endCall.addEventListener('click', endCurrentCall);

async function initChat(user){
  meUser = user;
  if (!peerUid) { showNotice('Нет пользователя для чата'); return; }
  peer = await getUser(peerUid);
  if (!peer) { showNotice('Пользователь не найден'); return; }
  peerHead.innerHTML = `${avatarHtml(peer)}<div class="col"><div class="name" style="font-size:20px">${esc(peer.nick || 'Без ника')}</div><div class="small">${esc(peer.about || 'Нет описания')}</div></div>`;
  chatRef = db.collection('chats').doc(chatIdFor(user.uid, peerUid));
  await ensureChat(user.uid, peerUid);
  messageUnsub = chatRef.collection('messages').orderBy('createdAt', 'asc').limit(200).onSnapshot(snap => {
    const list = snap.docs.map(d => ({ id: d.id, ...(d.data() || {}) }));
    renderMessages(list);
    markMessagesSeen(list);
  });
  callUnsub = calls.doc(chatRef.id).onSnapshot(async snap => {
    const data = snap.exists ? snap.data() : null;
    if (!data) { return; }
    currentCall = data.status === 'ended' ? null : data;
    if (data.status === 'ringing' && data.calleeId === meUser.uid && !pc) {
      showNotice(`${peer.nick} звонит. Нажми «Звонок», чтобы ответить.`);
      callStatus.textContent = 'Входящий звонок';
      openOverlay();
      callOverlay.style.display = 'flex';
      callTitle.textContent = `Звонок с ${peer.nick}`;
      setCallState('Входящий звонок');
      return;
    }
    if (data.status === 'active') {
      showNotice('');
      callTitle.textContent = `Звонок с ${peer.nick}`;
      openOverlay();
    }
    if (data.status === 'ended') {
      if (pc) { pc.close(); pc = null; }
      resetStreams();
      currentCall = null;
      incomingAnswerAllowed = false;
      setCallState('');
      closeOverlay();
      showNotice('Звонок завершён');
    }
    if (data.status === 'ringing' && data.callerId === meUser.uid) {
      showNotice('Звонок идёт...');
      callTitle.textContent = `Звонок с ${peer.nick}`;
      openOverlay();
    }
    if (data.answer && data.callerId === meUser.uid && pc && !incomingAnswerAllowed) {
      incomingAnswerAllowed = true;
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      calls.doc(chatRef.id).set({ status: 'active', updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      setCallState('Вы в звонке');
      watchCandidates('calleeCandidates', 'caller');
    }
  });
  message.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  sendBtn.addEventListener('click', sendMessage);
  setInterval(() => touchPresence(user), 60000);
}

updateButtons();
requireAuth(initChat);

toggleVideo.addEventListener('click', async () => {
  if (!pc) return;
  isVideo = !isVideo;
  updateButtons();
  if (localStream) {
    localStream.getVideoTracks().forEach(t => { t.stop(); });
    const want = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
    const audioTracks = want.getAudioTracks();
    const videoTracks = want.getVideoTracks();
    if (audioTracks[0]) {
      if (audioSender && audioSender.track) await audioSender.replaceTrack(audioTracks[0]);
      else audioSender = pc.addTrack(audioTracks[0], want);
    }
    if (videoTracks[0]) {
      if (videoSender && videoSender.track) await videoSender.replaceTrack(videoTracks[0]);
      else videoSender = pc.addTrack(videoTracks[0], want);
    }
    localStream = want;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    setLocalVideoStream();
    await safePlayMedia(localVideo);
  }
});

toggleMute.addEventListener('click', async () => {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  updateButtons();
});

</script>
