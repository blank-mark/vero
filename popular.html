<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vero • популярное</title>
<style>

  :root{
    --bg:#eef4ef;
    --bg2:#f7faf7;
    --panel:#ffffff;
    --panel2:#f2f7f2;
    --line:#dbe6db;
    --text:#122017;
    --muted:#5f7264;
    --accent:#2fa45a;
    --accent2:#1f7f42;
    --danger:#c94f4f;
    --shadow:0 16px 40px rgba(24, 44, 28, .08);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(47,164,90,.14), transparent 34%),
      radial-gradient(circle at bottom right, rgba(47,164,90,.08), transparent 28%),
      linear-gradient(180deg, var(--bg), #f8fbf8);
    color:var(--text);
  }
  a{color:inherit;text-decoration:none}
  button,input,textarea,select{font:inherit}
  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    position:sticky;top:0;z-index:20;
    backdrop-filter: blur(12px);
    background: rgba(238,244,239,.75);
    border-bottom:1px solid rgba(219,230,219,.8);
    padding:14px 18px;
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.3px}
  .logo{
    width:42px;height:42px;border-radius:14px;
    background: linear-gradient(145deg, var(--accent), #9be0b5);
    box-shadow: 0 10px 30px rgba(47,164,90,.25);
    display:grid;place-items:center;color:white;font-weight:900;
  }
  .shell{display:grid;grid-template-columns:320px 1fr;gap:18px;padding-top:18px}
  @media (max-width: 900px){ .shell{grid-template-columns:1fr} }
  .card{
    background:rgba(255,255,255,.82);
    border:1px solid rgba(219,230,219,.9);
    box-shadow:var(--shadow);
    border-radius:var(--radius);
  }
  .card.pad{padding:16px}
  .stack{display:grid;gap:12px}
  .muted{color:var(--muted)}
  .title{font-size:20px;font-weight:900;margin:0}
  .sub{margin:0;color:var(--muted);font-size:14px}
  .btn{
    border:0;border-radius:16px;padding:12px 16px;
    background:var(--accent);color:white;font-weight:800;cursor:pointer;
    box-shadow:0 10px 20px rgba(47,164,90,.18);
  }
  .btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.danger{background:var(--danger)}
  .btn.block{width:100%}
  .input, .textarea, .select{
    width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.95);
    color:var(--text);padding:12px 14px;outline:none;
  }
  .textarea{min-height:110px;resize:vertical}
  .row{display:flex;gap:10px;align-items:center}
  .row.wrap{flex-wrap:wrap}
  .grow{flex:1}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 12px;border-radius:999px;background:#edf7f0;border:1px solid #cce7d3;
    font-size:13px;font-weight:700;color:#215c34;
  }
  .pill{
    display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;
    background:#f3f7f4;border:1px solid var(--line);font-size:12px;color:var(--muted)
  }
  .list{display:grid;gap:10px}
  .item{
    display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;border:1px solid var(--line);
    background:rgba(255,255,255,.78);cursor:pointer;
  }
  .avatar{
    width:46px;height:46px;border-radius:16px;flex:0 0 auto;object-fit:cover;background:#e8eee9;
    border:1px solid #d6e0d7;
  }
  .avatar.big{width:96px;height:96px;border-radius:28px}
  .col{display:grid;gap:4px;min-width:0}
  .name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .desc{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab{
    padding:10px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);
    font-weight:800;cursor:pointer;
  }
  .tab.active{background:var(--accent);color:white;border-color:var(--accent)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width: 700px){ .grid2{grid-template-columns:1fr} }
  .divider{height:1px;background:var(--line);margin:12px 0}
  .small{font-size:12px}
  .kbd{font-family:ui-monospace, SFMono-Regular, Menlo, monospace;background:#f4f7f4;border:1px solid var(--line);padding:2px 6px;border-radius:8px}
  .chatbox{
    display:grid;grid-template-rows:auto 1fr auto;min-height:calc(100vh - 110px);
    gap:12px;padding:16px;
  }
  .messages{
    display:flex;flex-direction:column;gap:10px;overflow:auto;padding-right:4px;
  }
  .msg{
    max-width:min(720px, 85%);padding:11px 13px;border-radius:18px;border:1px solid var(--line);
    background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.03);
  }
  .msg.me{margin-left:auto;background:#ebf8ef;border-color:#cde5d4}
  .msg .time{display:block;margin-top:4px;font-size:11px;color:var(--muted)}
  .composer{display:flex;gap:10px;align-items:flex-end}
  .composer textarea{min-height:52px;max-height:180px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .canvasWrap{
    display:grid;gap:10px;align-items:start;
  }
  canvas{max-width:100%;border-radius:24px;border:1px solid var(--line);background:#fff;touch-action:none}
  .stat{
    padding:14px;border-radius:18px;border:1px solid var(--line);background:#fff;
    display:grid;gap:4px
  }
  .stat b{font-size:22px}
  .notice{
    padding:12px 14px;border-radius:18px;border:1px dashed #b8d8c0;background:#f7fbf7;color:#355541
  }
  .modal{
    position:fixed;inset:0;background:rgba(10,18,12,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
  }
  .modal.on{display:flex}
  .modal .card{max-width:520px;width:100%}

</style>

</head>
<body>
<script>
const FIREBASE_CONFIG = {
  "apiKey": "AIzaSyDGUSKBiKvEqSOg6QqY6iHC94C-SoxAujQ",
  "authDomain": "veromesendger.firebaseapp.com",
  "projectId": "veromesendger",
  "storageBucket": "veromesendger.firebasestorage.app",
  "messagingSenderId": "424869261701",

<script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore-compat.js"></script>

<script>

const app = firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const esc = (s='') => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid = () => auth.currentUser?.uid || null;

function nowMs(){ return Date.now(); }
function fmtTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString([], { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
}
function slug(s=''){
  return s.trim().toLowerCase().replace(/^#+/,'').replace(/[^\p{L}\p{N}]+/gu,'-').replace(/^-+|-+$/g,'').slice(0,42);
}
function parseTags(text=''){
  return [...new Set(text.split(',').map(x => x.trim()).map(x => x.replace(/^#+/,'')).map(slug).filter(Boolean))];
}
function parseList(text=''){
  return [...new Set(text.split(',').map(x => x.trim()).filter(Boolean))].slice(0,30);
}
async function upsertOwnProfile(partial, merge=true){
  const me = auth.currentUser;
  if(!me) throw new Error('not-auth');
  const ref = db.collection('users').doc(me.uid);
  await ref.set({ uid: me.uid, email: me.email || '', ...partial, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge });
}
async function loadOwnProfile(){
  const me = auth.currentUser;
  if(!me) return null;
  const snap = await db.collection('users').doc(me.uid).get();
  return snap.exists ? snap.data() : null;
}
async function ensureProfileBase(){
  const me = auth.currentUser;
  if(!me) return;
  const ref = db.collection('users').doc(me.uid);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      uid: me.uid,
      email: me.email || '',
      nickname: '',
      description: '',
      hashtags: [],
      games: [],
      avatarDataUrl: '',
      nicknameChangedAtMs: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }
}
async function getUser(uid){
  const snap = await db.collection('users').doc(uid).get();
  return snap.exists ? snap.data() : null;
}
function userDisplay(user){
  return user?.nickname || user?.email?.split('@')[0] || user?.uid?.slice(0,6) || 'User';
}
async function signOutSafe(){
  await auth.signOut();
  location.href = 'register.html';
}
function requireAuth(next){
  auth.onAuthStateChanged(async user => {
    if(!user){
      location.href = 'register.html';
      return;
    }
    await ensureProfileBase();
    next?.(user);
  });
}
async function makePairChatId(a,b){
  return [a,b].sort().join('__');
}

</script>

<div class="topbar">
  <div class="brand">
    <div class="logo">V</div>
    <div>
      <div style="font-weight:1000">Vero Popular</div>
      <div class="small muted">самые популярные теги и игры</div>
    </div>
  </div>
  <div class="row">
    <a class="btn secondary" href="app.html">Мессенджер</a>
    <a class="btn secondary" href="profile.html">Профиль</a>
    <button class="btn danger" id="logoutBtn">Выйти</button>
  </div>
</div>

<div class="wrap">
  <div class="grid2">
    <div class="card pad stack">
      <h2 class="title">Топ хештеги</h2>
      <p class="sub">Считается по всем профилям в Firestore.</p>
      <div class="list" id="tagsList"></div>
    </div>
    <div class="card pad stack">
      <h2 class="title">Топ игры / фандомы</h2>
      <p class="sub">Подойдёт для “Portal 2”, “Half-Life” и любых других повторяющихся названий.</p>
      <div class="list" id="gamesList"></div>
    </div>
  </div>
</div>

<script>

requireAuth(async () => {
  $('#logoutBtn').onclick = signOutSafe;

  const snap = await db.collection('users').get();
  const tagCount = new Map();
  const gameCount = new Map();
  snap.forEach(doc => {
    const u = doc.data();
    (u.hashtags || []).forEach(x => tagCount.set(x, (tagCount.get(x) || 0) + 1));
    (u.games || []).forEach(x => gameCount.set(x, (gameCount.get(x) || 0) + 1));
  });

  function render(map, el){
    const items = [...map.entries()].sort((a,b) => b[1] - a[1]).slice(0, 20);
    el.innerHTML = items.map(([name,count], i) => `
      <div class="item">
        <div class="chip">#${i+1}</div>
        <div class="col" style="flex:1">
          <div class="name">${esc(name)}</div>
          <div class="desc">${count} профилей</div>
        </div>
        <div class="pill">${count}</div>
      </div>
    `).join('') || `<div class="muted small">Пока нет данных</div>`;
  }
  render(tagCount, $('#tagsList'));
  render(gameCount, $('#gamesList'));
});

</script>
</body>
</html>
