<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="favicon.png" />
<title>Vero • профиль</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>

:root{
  --bg:#eef4ef;
  --bg2:#f7faf7;
  --panel:#ffffff;
  --panel2:#f2f7f2;
  --line:#dbe6db;
  --text:#122017;
  --muted:#5f7264;
  --accent:#2fa45a;
  --accent2:#1f7f42;
  --danger:#c94f4f;
  --shadow:0 16px 40px rgba(24, 44, 28, .08);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(47,164,90,.14), transparent 34%),
    radial-gradient(circle at bottom right, rgba(47,164,90,.08), transparent 28%),
    linear-gradient(180deg, var(--bg), #f8fbf8);
  color:var(--text);
}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
.wrap{max-width:1280px;margin:0 auto;padding:18px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:20;
  backdrop-filter: blur(12px);
  background: rgba(238,244,239,.78);
  border-bottom:1px solid rgba(219,230,219,.9);
  padding:14px 18px;
}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.2px}
.logo{
  width:42px;height:42px;border-radius:14px;
  background: linear-gradient(145deg, var(--accent), #9be0b5);
  box-shadow: 0 10px 30px rgba(47,164,90,.22);
  display:grid;place-items:center;color:white;font-weight:900;
}
.shell{display:grid;grid-template-columns:360px 1fr;gap:18px;padding-top:18px}
@media (max-width: 980px){ .shell{grid-template-columns:1fr} .topbar{flex-wrap:wrap} }
.card{
  background:rgba(255,255,255,.84);
  border:1px solid rgba(219,230,219,.95);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.card.pad{padding:16px}
.stack{display:grid;gap:12px}
.muted{color:var(--muted)}
.title{font-size:20px;font-weight:900;margin:0}
.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.4}
.btn{
  border:0;border-radius:16px;padding:12px 16px;
  background:var(--accent);color:white;font-weight:800;cursor:pointer;
  box-shadow:0 10px 20px rgba(47,164,90,.18);
}
.btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.danger{background:var(--danger)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.block{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed}
.input, .textarea, .select{
  width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.96);
  color:var(--text);padding:12px 14px;outline:none;
}
.textarea{min-height:120px;resize:vertical}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.grow{flex:1}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:999px;background:#edf7f0;border:1px solid #cce7d3;
  font-size:13px;font-weight:700;color:#215c34;
}
.chip.soft{background:#f4f7f4;border-color:#dee6df;color:#4f6756}
.chip.clickable{cursor:pointer}
.pill{
  display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;
  background:#f3f7f4;border:1px solid var(--line);font-size:12px;color:var(--muted)
}
.list{display:grid;gap:10px}
.item{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;border:1px solid var(--line);
  background:rgba(255,255,255,.78);cursor:pointer;
}
.item:hover{transform:translateY(-1px)}
.avatar{
  width:46px;height:46px;border-radius:16px;flex:0 0 auto;object-fit:cover;background:#e8eee9;
  border:1px solid #d6e0d7;
}
.avatar.big{width:96px;height:96px;border-radius:28px}
.avatar.tiny{width:28px;height:28px;border-radius:10px}
.col{display:grid;gap:4px;min-width:0}
.name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.desc{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{
  padding:10px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);
  font-weight:800;cursor:pointer
}
.tab.active{background:linear-gradient(145deg, rgba(47,164,90,.16), rgba(47,164,90,.04));color:var(--accent2);border-color:#b8dfc1}
.hero{
  display:grid;gap:14px;padding:18px;border-radius:26px;
  background:linear-gradient(135deg, rgba(47,164,90,.13), rgba(255,255,255,.86));
  border:1px solid rgba(184,223,193,.9);
}
.hero h1{margin:0;font-size:30px;line-height:1.05}
.hero p{margin:0;color:var(--muted);max-width:62ch}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width: 700px){ .grid2{grid-template-columns:1fr} }
.panel-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.sep{height:1px;background:var(--line);margin:12px 0}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;background:#e9f6ed;color:#2f7a45;font-size:12px;font-weight:800}
.small{font-size:12px;color:var(--muted)}
.empty{padding:18px;border:1px dashed #cfd9d0;border-radius:18px;background:rgba(255,255,255,.5);color:var(--muted);text-align:center}
.avatarBox{display:grid;gap:12px;justify-items:start}
.canvasWrap{border:1px solid var(--line);border-radius:22px;overflow:hidden;background:white}
canvas{display:block;touch-action:none}
.msgs{display:grid;gap:10px;max-height:62vh;overflow:auto;padding-right:4px}
.msg{
  max-width:78%;padding:12px 14px;border-radius:18px;border:1px solid var(--line);background:#fff;box-shadow:0 6px 18px rgba(24,44,28,.05);
}
.msg.me{margin-left:auto;background:#edf8f0;border-color:#cfe8d5}
.msg .meta{margin-top:6px;font-size:11px;color:var(--muted)}
.chatHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px}
.chatPeer{display:flex;align-items:center;gap:12px;min-width:0}
.chatPeer .col{min-width:0}
.toolbar{display:flex;gap:10px;flex-wrap:wrap}
.callOverlay{
  position:fixed;inset:0;background:rgba(11,17,13,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;
}
.callCard{
  width:min(980px, 100%);
  background:rgba(255,255,255,.96);border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.35);
  box-shadow:0 30px 80px rgba(0,0,0,.28);
}
.callTop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
.callBody{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
@media (max-width: 850px){ .callBody{grid-template-columns:1fr} }
.videobox{position:relative;border-radius:22px;overflow:hidden;background:#09110b;min-height:240px;border:1px solid #dfe7e0}
.videobox video{width:100%;height:100%;object-fit:cover;display:block}
.videolabel{position:absolute;left:12px;top:12px;z-index:2;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.45);color:white;font-size:12px}
.callControls{display:flex;gap:10px;flex-wrap:wrap;padding:0 14px 14px}
.callActions{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:0 14px 14px}
.kbd{font-size:12px;color:var(--muted);padding:6px 8px;border:1px solid var(--line);border-radius:10px;background:#fafcfa}
.notice{padding:12px 14px;border-radius:16px;background:#fff8e7;border:1px solid #f0ddb0;color:#745b17}

</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="logo">V</div><div><div>Vero</div><div class="small">профиль</div></div></div>
  <div class="tabs">
    <a class="tab" href="app.html">Мессенджер</a>
    <a class="tab" href="popular.html">Популярное</a>
    <a class="tab active" href="profile.html">Профиль</a>
  </div>
</div>
<div class="wrap">
  <div class="hero" style="margin-bottom:16px">
    <div class="row wrap" style="justify-content:space-between">
      <div>
        <h1>Профиль</h1>
        <p>Ник, описание, теги, игры и аватарка. UID спрятан и показан только маленькой строкой тут.</p>
      </div>
      <span class="pill" id="uidSmall">uid: ...</span>
    </div>
  </div>

  <div class="shell">
    <div class="stack">
      <div class="card pad">
        <div class="panel-title"><h2 class="title">Себя</h2><span class="pill">онлайн</span></div>
        <div class="avatarBox">
          <div id="avatarPreview"></div>
          <div class="canvasWrap">
            <canvas id="draw" width="320" height="320"></canvas>
          </div>
          <div class="row wrap">
            <input id="brushColor" type="color" class="input" style="width:84px;padding:6px 8px;height:44px" />
            <input id="brushSize" type="range" min="2" max="30" value="10" style="flex:1" />
            <button id="clearAvatar" class="btn secondary">Очистить</button>
            <button id="saveAvatar" class="btn">Сохранить рисунок</button>
          </div>
        </div>
      </div>
    </div>

    <div class="stack">
      <div class="card pad">
        <div class="panel-title"><h2 class="title">Данные профиля</h2><span class="pill">ник раз в день</span></div>
        <div class="stack">
          <input id="nick" class="input" placeholder="Ник" />
          <textarea id="about" class="textarea" placeholder="Описание"></textarea>
          <div>
            <div class="small" style="margin-bottom:8px">Хештеги</div>
            <div class="row wrap"><input id="tagInput" class="input grow" placeholder="#gaming, #art" /><button id="addTag" class="btn secondary">Добавить</button></div>
            <div id="tagsBox" class="row wrap" style="margin-top:10px"></div>
            <div id="tagSug" class="row wrap" style="margin-top:10px"></div>
          </div>
          <div>
            <div class="small" style="margin-bottom:8px">Игры и фандомы</div>
            <div class="row wrap"><input id="gameInput" class="input grow" placeholder="Portal 2, Half-Life, Minecraft" /><button id="addGame" class="btn secondary">Добавить</button></div>
            <div id="gamesBox" class="row wrap" style="margin-top:10px"></div>
            <div id="gameSug" class="row wrap" style="margin-top:10px"></div>
          </div>
          <div class="row wrap">
            <button id="saveProfile" class="btn">Сохранить профиль</button>
            <span class="small" id="status"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

const firebaseConfig = {
  "apiKey": "AIzaSyDGUSKBiKvEqSOg6QqY6iHC94C-SoxAujQ",
  "authDomain": "veromesendger.firebaseapp.com",
  "projectId": "veromesendger",
  "storageBucket": "veromesendger.firebasestorage.app",
  "messagingSenderId": "424869261701",
  "appId": "1:424869261701:web:289a4b7e386b960d6314ec",
  "measurementId": "G-C63GM9P098"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const users = db.collection('users');
const chats = db.collection('chats');
const calls = db.collection('calls');

const GAME_SUGGESTIONS = ['Half-Life','Half-Life 2','Portal','Portal 2','Team Fortress 2','Counter-Strike 2','Minecraft','Roblox','GTA V','GTA San Andreas','Terraria','Rust','Fortnite','Valorant','Dota 2','CS:GO','Among Us','Phasmophobia','Lethal Company','The Binding of Isaac','Hades','Stardew Valley'];
const TAG_SUGGESTIONS = ['#art','#gaming','#meme','#music','#anime','#programming','#friends','#chat','#design','#edit'];

const DAY_MS = 86400000;

function nickKey(v){
  return String(v || '').trim().toLowerCase().replace(/\s+/g,' ');
}
function cleanNick(v){
  return String(v || '').trim().replace(/^@+/, '').replace(/\s+/g,' ').slice(0,24);
}
function asList(v){
  if (Array.isArray(v)) return v;
  if (!v) return [];
  return String(v).split(',').map(s => s.trim()).filter(Boolean);
}
function formatTime(v){
  if (!v || !v.toDate) return '';
  return new Intl.DateTimeFormat('ru-RU', {hour:'2-digit', minute:'2-digit'}).format(v.toDate());
}
function formatDate(v){
  if (!v || !v.toDate) return '';
  return new Intl.DateTimeFormat('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'}).format(v.toDate());
}
function initials(nick){
  const p = String(nick || '?').trim().split(/\s+/).filter(Boolean);
  const a = (p[0] || '?')[0] || '?';
  const b = (p[1] || '')[0] || '';
  return (a + b).toUpperCase();
}
function avatarHtml(profile, extraClass=''){
  const cls = `avatar ${extraClass}`.trim();
  const alt = (profile && profile.nick) ? profile.nick : 'avatar';
  if (profile && profile.avatarData) return `<img class="${cls}" src="${profile.avatarData}" alt="${alt}">`;
  if (profile && profile.photoURL) return `<img class="${cls}" src="${profile.photoURL}" alt="${alt}">`;
  return `<div class="${cls}" style="display:grid;place-items:center;background:linear-gradient(145deg, rgba(47,164,90,.18), rgba(47,164,90,.05));color:#235d34;font-weight:900">${initials(profile && profile.nick ? profile.nick : '?')}</div>`;
}
function chatIdFor(a, b){
  return [a, b].sort().join('__');
}
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function requireAuth(onReady){
  auth.onAuthStateChanged(async user => {
    if (!user) {
      location.href = 'register.html';
      return;
    }
    await touchPresence(user);
    if (onReady) onReady(user);
  });
}
async function touchPresence(user){
  const ref = users.doc(user.uid);
  const snap = await ref.get();
  const base = snap.exists ? (snap.data() || {}) : {};
  const nick = base.nick || user.displayName || (user.email ? user.email.split('@')[0] : 'user');
  await ref.set({
    uid: user.uid,
    email: user.email || base.email || '',
    photoURL: user.photoURL || base.photoURL || '',
    nick,
    nickLower: nickKey(nick),
    avatarData: base.avatarData || '',
    about: base.about || '',
    tags: Array.isArray(base.tags) ? base.tags : [],
    games: Array.isArray(base.games) ? base.games : [],
    lastNickChangeAt: base.lastNickChangeAt || null,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: base.createdAt || firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}
async function getMe(){
  const user = auth.currentUser;
  if (!user) return null;
  const snap = await users.doc(user.uid).get();
  return { user, data: snap.exists ? snap.data() : null };
}
async function getUser(uid){
  const snap = await users.doc(uid).get();
  return snap.exists ? snap.data() : null;
}
function createTokenChips(container, items, onRemove){
  container.innerHTML = '';
  (items || []).forEach((item, idx) => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.innerHTML = `${esc(item)} <span style="opacity:.7">×</span>`;
    el.title = 'Убрать';
    if (onRemove) el.addEventListener('click', () => onRemove(idx));
    container.appendChild(el);
  });
}
function setText(el, text){ if (el) el.textContent = text ?? ''; }
async function ensureNickUnique(nick, myUid){
  const key = nickKey(nick);
  const q = await users.where('nickLower', '==', key).limit(1).get();
  return q.empty || q.docs[0].id === myUid;
}
async function createOrUpdateProfile(user, nickOverride){
  const ref = users.doc(user.uid);
  const snap = await ref.get();
  const current = snap.exists ? snap.data() : {};
  const chosen = cleanNick(nickOverride || current.nick || user.displayName || (user.email ? user.email.split('@')[0] : 'user'));
  if (!chosen) throw new Error('Ник пустой');
  if (!(await ensureNickUnique(chosen, user.uid))) throw new Error('Этот ник уже занят');
  const nickChanged = current.nick && nickKey(current.nick) !== nickKey(chosen);
  if (nickChanged && current.lastNickChangeAt && current.lastNickChangeAt.toDate) {
    const diff = Date.now() - current.lastNickChangeAt.toDate().getTime();
    if (diff < DAY_MS) throw new Error('Ник можно менять только раз в день');
  }
  await ref.set({
    uid: user.uid,
    email: user.email || current.email || '',
    photoURL: user.photoURL || current.photoURL || '',
    nick: chosen,
    nickLower: nickKey(chosen),
    about: current.about || '',
    tags: Array.isArray(current.tags) ? current.tags : [],
    games: Array.isArray(current.games) ? current.games : [],
    avatarData: current.avatarData || '',
    lastNickChangeAt: nickChanged ? firebase.firestore.FieldValue.serverTimestamp() : (current.lastNickChangeAt || null),
    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: current.createdAt || firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}
function openChat(uid){
  location.href = 'chat.html?u=' + encodeURIComponent(uid);
}
function go(url){ location.href = url; }
async function ensureChat(me, peer){
  const id = chatIdFor(me, peer);
  const ref = chats.doc(id);
  const snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      participants: [me, peer],
      participantsKey: id,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: '',
      lastSenderId: ''
    });
  }
  return id;
}
function timeAgo(ts){
  if (!ts || !ts.toDate) return '—';
  const d = ts.toDate().getTime();
  const diff = Date.now() - d;
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'только что';
  if (min < 60) return `${min} мин назад`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h} ч назад`;
  return `${Math.floor(h/24)} дн назад`;
}
function onlineLabel(lastSeen){
  if (!lastSeen || !lastSeen.toDate) return 'неизвестно';
  const diff = Date.now() - lastSeen.toDate().getTime();
  if (diff < 2 * 60 * 1000) return 'сейчас онлайн';
  if (diff < 10 * 60 * 1000) return 'недавно онлайн';
  return timeAgo(lastSeen);
}


const uidSmall = document.getElementById('uidSmall');
const nickInput = document.getElementById('nick');
const aboutInput = document.getElementById('about');
const tagsBox = document.getElementById('tagsBox');
const gamesBox = document.getElementById('gamesBox');
const tagInput = document.getElementById('tagInput');
const gameInput = document.getElementById('gameInput');
const tagSug = document.getElementById('tagSug');
const gameSug = document.getElementById('gameSug');
const status = document.getElementById('status');
const avatarPreview = document.getElementById('avatarPreview');
const canvas = document.getElementById('draw');
const ctx = canvas.getContext('2d');
const brushColor = document.getElementById('brushColor');
const brushSize = document.getElementById('brushSize');
let meUser = null;
let profile = null;
let tags = [];
let games = [];
let drawing = false;

function toast(text, good=false){
  status.textContent = text || '';
  status.style.color = good ? 'var(--accent2)' : 'var(--danger)';
}
function drawBg(){
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,'rgba(47,164,90,.08)');
  g.addColorStop(1,'rgba(47,164,90,.02)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}
function loadAvatarData(url){
  if (!url) { drawBg(); return; }
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
  img.src = url;
}
function canvasToData(){ return canvas.toDataURL('image/png'); }
function renderAvatarPreview(){
  avatarPreview.innerHTML = avatarHtml({ nick: nickInput.value || profile?.nick || 'Vero', avatarData: profile?.avatarData || '' }, 'big');
}
function renderTokens(){
  createTokenChips(tagsBox, tags, idx => { tags.splice(idx,1); renderTokens(); });
  createTokenChips(gamesBox, games, idx => { games.splice(idx,1); renderTokens(); });
  renderAvatarPreview();
}
function suggestionPills(container, items, onPick){
  container.innerHTML = items.map(v => `<span class="chip soft clickable">${esc(v)}</span>`).join('');
  [...container.querySelectorAll('.clickable')].forEach((el, i) => el.addEventListener('click', () => onPick(items[i])));
}
function addTag(v){
  const value = cleanNick(v).replace(/^#+/,'#');
  if (!value) return;
  const final = value.startsWith('#') ? value : `#${value}`;
  if (!tags.map(x => nickKey(x)).includes(nickKey(final))) tags.push(final);
  tagInput.value = '';
  renderTokens();
}
function addGame(v){
  const value = String(v || '').trim();
  if (!value) return;
  if (!games.map(x => nickKey(x)).includes(nickKey(value))) games.push(value);
  gameInput.value = '';
  renderTokens();
}

brushColor.value = '#2fa45a';
drawBg();
renderTokens();
suggestionPills(tagSug, TAG_SUGGESTIONS, addTag);
suggestionPills(gameSug, GAME_SUGGESTIONS, addGame);

tagInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTag(tagInput.value); } });
gameInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addGame(gameInput.value); } });
document.getElementById('addTag').addEventListener('click', () => addTag(tagInput.value));
document.getElementById('addGame').addEventListener('click', () => addGame(gameInput.value));
document.getElementById('clearAvatar').addEventListener('click', () => { drawBg(); if (meUser) toast(''); });
document.getElementById('saveAvatar').addEventListener('click', async () => {
  try{
    if (!meUser) return;
    await users.doc(meUser.uid).set({ avatarData: canvasToData(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
    profile.avatarData = canvasToData();
    renderTokens();
    toast('Аватарка сохранена', true);
  } catch (e) { toast(e.message || 'Не сохранилось'); }
});

auth.onAuthStateChanged(user => { if (!user) location.href='register.html'; });

canvas.addEventListener('pointerdown', e => {
  drawing = true;
  const r = canvas.getBoundingClientRect();
  ctx.strokeStyle = brushColor.value;
  ctx.lineWidth = Number(brushSize.value);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo((e.clientX - r.left) * canvas.width / r.width, (e.clientY - r.top) * canvas.height / r.height);
});
canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  const r = canvas.getBoundingClientRect();
  ctx.lineTo((e.clientX - r.left) * canvas.width / r.width, (e.clientY - r.top) * canvas.height / r.height);
  ctx.stroke();
});
window.addEventListener('pointerup', () => drawing = false);

function updateCanvasFromProfile(){
  nickInput.value = profile?.nick || '';
  aboutInput.value = profile?.about || '';
  tags = Array.isArray(profile?.tags) ? [...profile.tags] : [];
  games = Array.isArray(profile?.games) ? [...profile.games] : [];
  renderTokens();
  loadAvatarData(profile?.avatarData || '');
  uidSmall.textContent = `uid: ${meUser.uid.slice(0, 10)}...`;
}

function canChangeNick(nowData){
  if (!nowData?.lastNickChangeAt || !nowData.lastNickChangeAt.toDate) return true;
  return Date.now() - nowData.lastNickChangeAt.toDate().getTime() >= DAY_MS;
}

document.getElementById('saveProfile').addEventListener('click', async () => {
  try{
    const newNick = cleanNick(nickInput.value);
    if (!newNick) throw new Error('Ник пустой');
    if (nickKey(newNick) !== nickKey(profile?.nick || '')) {
      if (!canChangeNick(profile)) throw new Error('Ник можно менять только раз в день');
      if (!(await ensureNickUnique(newNick, meUser.uid))) throw new Error('Этот ник уже занят');
    }
    const payload = {
      nick: newNick,
      nickLower: nickKey(newNick),
      about: aboutInput.value.trim().slice(0, 240),
      tags: tags.slice(0, 20),
      games: games.slice(0, 20),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (nickKey(newNick) !== nickKey(profile?.nick || '')) payload.lastNickChangeAt = firebase.firestore.FieldValue.serverTimestamp();
    await users.doc(meUser.uid).set(payload, { merge: true });
    toast('Профиль сохранён', true);
  } catch (e) { toast(e.message || 'Не сохранилось'); }
});

requireAuth(async user => {
  meUser = user;
  const snap = await users.doc(user.uid).get();
  profile = snap.exists ? snap.data() : {};
  if (!profile.nick) {
    await createOrUpdateProfile(user);
    const next = await users.doc(user.uid).get();
    profile = next.data() || {};
  }
  updateCanvasFromProfile();
  setInterval(() => touchPresence(user), 60000);
});

</script>
